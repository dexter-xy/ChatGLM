# ChatGLM专用Docker Compose配置文件
# 基于LibreChat框架的ChatGLM网页对话应用

version: '3.8'

services:
  # ChatGLM API服务
  chatglm-api:
    image: chatglm-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatglm-web-app
    restart: unless-stopped
    ports:
      - "3080:3080"
    depends_on:
      - mongodb
    environment:
      # 基础配置
      - HOST=0.0.0.0
      - PORT=3080
      - MONGO_URI=mongodb://mongodb:27017/ChatGLM
      - DOMAIN_CLIENT=http://localhost:3080
      - DOMAIN_SERVER=http://localhost:3080
      
      # ChatGLM API配置
      - CHATGLM_API_KEY=${CHATGLM_API_KEY}
      - CHATGLM_ENDPOINT=${CHATGLM_ENDPOINT}
      - CHATGLM_DEFAULT_MODEL=chatglm-6b
      
      # JWT配置
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-super-secret-refresh-key-change-this}
      
      # 应用配置
      - APP_TITLE=ChatGLM对话助手
      - DEFAULT_LANGUAGE=zh-CN
      - ALLOW_REGISTRATION=false
      - ALLOW_SOCIAL_LOGIN=false
      
      # 性能配置
      - LIMIT_CONCURRENT_MESSAGES=true
      - LIMIT_MESSAGE_IP=true
      - LIMIT_MESSAGE_USER=true
      - LOG_LEVEL=info
      
      # 安全配置
      - NO_INDEX=true
      - TRUST_PROXY=1
      - MIN_PASSWORD_LENGTH=8
    volumes:
      - ./data/uploads:/app/client/public/images
      - ./data/logs:/app/logs
    networks:
      - chatglm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # MongoDB数据库
  mongodb:
    image: mongo:6.0
    container_name: chatglm-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-password123}
      - MONGO_INITDB_DATABASE=ChatGLM
    volumes:
      - mongodb_data:/data/db
      - ./data/mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - chatglm-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis缓存 (可选)
  redis:
    image: redis:7-alpine
    container_name: chatglm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    networks:
      - chatglm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx反向代理 (可选)
  nginx:
    image: nginx:alpine
    container_name: chatglm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./data/logs/nginx:/var/log/nginx
    depends_on:
      - chatglm-api
    networks:
      - chatglm-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  chatglm-network:
    driver: bridge